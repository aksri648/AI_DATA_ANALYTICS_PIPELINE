services:
  - type: web
    name: ai-analytics-copilot
    runtime: python
    branch: main
    buildCommand: |
      cd frontend && npm install && npm run build && cd ..
      pip install fastapi uvicorn python-multipart
      pip install crewai langchain langchain-core langchain-community langchain-ollama ollama
      pip install pandas numpy pyarrow openpyxl xlrd
      pip install duckdb sqlalchemy psycopg2-binary pymysql
      pip install plotly altair
      pip install requests python-dotenv pydantic pydantic-settings
      pip install mcp
    startCommand: uvicorn app.backend_api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: OLLAMA_MODEL
        value: qwen2.5:14b
      - key: DUCKDB_PATH
        value: /var/data/analytics.duckdb
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
